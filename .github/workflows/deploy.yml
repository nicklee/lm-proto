name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set base path
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

      - name: Set prototype password hash
        env:
          PROTOTYPE_PASSWORD: ${{ secrets.PROTOTYPE_PASSWORD }}
        run: |
          if [ -n "$PROTOTYPE_PASSWORD" ]; then
            HASH=$(printf '%s' "$PROTOTYPE_PASSWORD" | sha256sum | awk '{print $1}')
          else
            HASH="7624cde6ff7176835ff3ef8ae23c98db72966fe6023c00f5309b85370464050e"
          fi
          echo "VITE_PROTOTYPE_PASSWORD_HASH=$HASH" >> "$GITHUB_ENV"

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
